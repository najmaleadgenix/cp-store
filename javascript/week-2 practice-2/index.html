<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meal Search</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light">

    <div class="container my-5 p-5 text-center">
      <div class="row justify-content-center">
        <div class="col-6 d-flex flex-column">
          <h1>Search Your Meal</h1>
          <div class="input-group my-4">
            <input
              type="text"
              id="inputSearch"
              class="form-control"
              placeholder="Search Meal"
              aria-label="Recipient’s username"
              aria-describedby="button-addon2"
            />
            <button
              class="btn btn-primary"
              type="button"
              id="button-addon2"
            >
              Search
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="container text-center">
        <h3>Meals</h3>
        <hr>
        <div id="containMeals" class="containMeals mb-5">
                <div id="cardContain" class="cardContain d-flex flex-wrap gap-5">

                </div>
                <h1 id="notFoundMessage" class="text-danger fw-bold"> </h1>
        </div>
        
    </div>

    <!-- modal -->
     <div id="mealModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
        <div class="modal-content">
        <div class="modal-header">
        <h5 id="modal-title" class="modal-title">Modal title</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <!-- <h2 id="name" class="name"> </h2> -->
        <img id="mealModalImg" class="mealModalImg img-fluid " src="" alt="meal_image">
        <p id="description" class="description"> </p>
      </div>
    </div>
  </div>
</div>

    <script src="mealSearch.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
